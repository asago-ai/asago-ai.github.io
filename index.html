<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>asago - Coming Soon</title>
    <link rel="icon" href="asago_single_icon.png" type="image/png">
    <style>
        :root {
            --primary-color: #2d7ff9;
            --secondary-color: #0dd4a0;
            --darker-bg: #000108;
            --text-secondary: #cbd5e1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: var(--darker-bg);
            color: var(--text-secondary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            padding: 2rem;
        }

        .logo {
            width: min(560px, 85vw);
            height: auto;
            display: block;
            margin: 0 auto 2rem;
        }

        .tagline {
            font-size: 1.3rem;
            font-style: italic;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            letter-spacing: 0.01em;
        }

        .coming-soon {
            font-size: 1.1rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .container { animation: fadeInUp 0.7s ease-out; }
    </style>
</head>
<body>
    <div class="container">
        <img class="logo" src="asago_full_logo.png" alt="asago - AI Safety And Governance Orchestration" />
        <p class="tagline">AI Safety And Governance Orchestration</p>
        <p class="coming-soon">Coming soon...</p>
    </div>
</body>
</html>
